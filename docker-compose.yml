version: '3.8'

services:
  clamav:
    image: ajilaag/clamav-rest:latest
    container_name: clamav_service
    ports:
      - "9000:9000"
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_service
    ports:
      # Expose directly to your Windows host machine
      - "5678:5678"
    restart: unless-stopped
    environment:
      # 0.0.0.0 tells n8n to accept traffic routed by Docker
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Point the webhook to standard localhost
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=n8nComplianceHubSecretKey
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: